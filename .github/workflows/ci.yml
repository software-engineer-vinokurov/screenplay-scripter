name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Install cliclick
        run: brew install cliclick

      - name: Run tests
        run: uv run pytest

      - name: Build
        run: uv build

      - name: Verify installed package works
        run: |
          uv venv /tmp/smoke-venv --python 3.12
          uv pip install --python /tmp/smoke-venv/bin/python dist/*.whl
          /tmp/smoke-venv/bin/scripter --version
          /tmp/smoke-venv/bin/scripter --help
