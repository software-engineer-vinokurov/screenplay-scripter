name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Install cliclick
        run: brew install cliclick

      - name: Check tag matches pyproject.toml version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PROJECT_VERSION="$(uv run python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          if [ "$TAG_VERSION" != "$PROJECT_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match pyproject.toml version $PROJECT_VERSION"
            exit 1
          fi

      - name: Run tests
        run: uv run pytest

      - name: Build
        run: uv build

      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: uv publish

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --title "$GITHUB_REF_NAME" --generate-notes

      - name: Update Homebrew tap
        continue-on-error: true
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$HOMEBREW_TAP_TOKEN" ]; then
            echo "::warning::HOMEBREW_TAP_TOKEN secret not set; skipping Homebrew tap update"
            exit 1
          fi

          TAG="$GITHUB_REF_NAME"
          ARCHIVE_URL="https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${TAG}.tar.gz"
          curl -sL "$ARCHIVE_URL" -o /tmp/release.tar.gz
          SHA256="$(shasum -a 256 /tmp/release.tar.gz | cut -d' ' -f1)"

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/software-engineer-vinokurov/homebrew-tap.git" /tmp/homebrew-tap

          cat > /tmp/update_formula.py <<'PYEOF'
          import re
          import sys
          import pathlib

          tag, sha256 = sys.argv[1], sys.argv[2]
          path = pathlib.Path("/tmp/homebrew-tap/Formula/screenplay-scripter.rb")
          text = path.read_text()
          pattern = re.compile(
              r'url "https://github\.com/software-engineer-vinokurov/screenplay-scripter/archive/refs/tags/v\d+\.\d+\.\d+\.tar\.gz"\n'
              r'  sha256 "[a-f0-9]{64}"'
          )
          replacement = (
              f'url "https://github.com/software-engineer-vinokurov/screenplay-scripter/archive/refs/tags/{tag}.tar.gz"\n'
              f'  sha256 "{sha256}"'
          )
          new_text, count = pattern.subn(replacement, text)
          if count != 1:
              sys.exit(f"expected exactly 1 replacement, got {count}")
          path.write_text(new_text)
          PYEOF

          python3 /tmp/update_formula.py "$TAG" "$SHA256"

          cd /tmp/homebrew-tap
          if git diff --quiet; then
            echo "Formula already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "screenplay-scripter ${TAG#v}"
          git push origin main
